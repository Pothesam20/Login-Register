spring:
  application:
    name: loginregister-backend
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: ''
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwtSecret: mySecretKeyForJWTTokenGenerationAndValidationPurposeOnly
  jwtExpirationMs: 86400000

logging:
  level:
    com.auth: DEBUG
    org.springframework.security: DEBUG
    org.hibernate: INFO
